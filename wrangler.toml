name = "gen-voice-ai"
compatibility_date = "2024-01-01"
pages_build_output_dir = ".vercel/output/static"

# Bắt buộc cho @cloudflare/next-on-pages (tránh lỗi "Node.JS Compatibility Error")
compatibility_flags = ["nodejs_compat"]

# R2 bucket binding for TTS models
# VIETVOICE_MODELS will be mapped to the R2 bucket
[[r2_buckets]]
binding = "VIETVOICE_MODELS"
bucket_name = "genvoice-models"
